<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Login page</title>
  </head>
  <body>
    <main>
      <h1>Login Page</h1>
      <h3>
        Please type in cookies from your logged in profile. Preferably don't log out from it so cookies don't reset. Or you would need to set them up once again.
      </h3>
      <h3>All data is confidential!</h3>
      <form id="field">
        <label for="cookies">Your cookies:</label>
        <input type="text" id="cookies" placeholder="cf_clearance=abc...; remember_web_123=xyz...; session=123..." />
        <button type="submit">Sign in</button>
      </form>

      <p id="status-message"></p>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
